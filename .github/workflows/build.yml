name: build-and-test
on:
  push:
    branches: [main, master]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore NimbusBoard.slnx
      - run: dotnet build NimbusBoard.slnx --no-restore --configuration Release
      - run: dotnet test NimbusBoard.slnx --no-build --configuration Release --verbosity normal
